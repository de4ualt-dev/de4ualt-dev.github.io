<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>de4ualt-dev / releases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0a;
      --bg2:       #111111;
      --bg3:       #181818;
      --border:    #222222;
      --border2:   #2e2e2e;
      --green:     #39ff6a;
      --green-dim: #1a4a2e;
      --text:      #d4d4d4;
      --text-dim:  #555555;
      --text-muted:#888888;
      --red:       #ff4444;
      --yellow:    #f0c040;
      --blue:      #4da6ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      z-index: 9999;
    }

    /* noise texture */
    body::after {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      z-index: 9998;
    }

    /* ── HEADER ── */
    header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .prompt-symbol {
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .site-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .site-title span { color: var(--green); }

    .header-sub {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      padding-left: 22px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 14px;
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }

    .status-bar .sep { color: var(--border2); }

    /* ── MAIN ── */
    main {
      padding: 0 16px 60px;
      max-width: 540px;
      margin: 0 auto;
    }

    /* loading state */
    #loading {
      padding: 60px 0;
      text-align: center;
    }

    .loader-text {
      font-size: 12px;
      color: var(--green);
      font-family: 'IBM Plex Mono', monospace;
    }

    .loader-bar {
      margin: 12px auto 0;
      width: 160px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: var(--green);
      animation: slide 1s ease-in-out infinite alternate;
    }
    @keyframes slide { from{transform:translateX(-100%)} to{transform:translateX(350%)} }

    /* error state */
    #error-msg {
      display: none;
      margin: 30px 0;
      padding: 14px;
      border: 1px solid var(--red);
      border-radius: 4px;
      background: rgba(255,68,68,0.05);
      font-size: 11px;
      color: var(--red);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* section label */
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px 0 12px;
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── RELEASE CARD ── */
    .release-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.4s ease both;
    }
    .release-card:hover {
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px) }
      to   { opacity:1; transform:translateY(0) }
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 14px 14px 10px;
      gap: 10px;
    }

    .card-left { flex: 1; min-width: 0; }

    .tag-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 9px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-latest {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(57,255,106,0.25);
    }
    .badge-prerelease {
      background: rgba(240,192,64,0.1);
      color: var(--yellow);
      border: 1px solid rgba(240,192,64,0.25);
    }
    .badge-tag {
      background: var(--bg3);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .release-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .release-date {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      margin-top: 3px;
    }

    /* body / notes */
    .card-body {
      padding: 0 14px 12px;
    }

    .release-notes {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      line-height: 1.7;
      border-left: 2px solid var(--border2);
      padding-left: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .notes-toggle {
      background: none;
      border: none;
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      padding: 4px 0 8px;
      display: block;
    }
    .notes-toggle:hover { text-decoration: underline; }

    /* assets */
    .card-assets {
      border-top: 1px solid var(--border);
      padding: 10px 14px 12px;
    }

    .assets-label {
      font-size: 9px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 7px;
    }

    .asset-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .asset-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .asset-link:hover {
      border-color: var(--green);
      background: rgba(57,255,106,0.04);
    }

    .asset-icon { color: var(--green); font-size: 11px; flex-shrink: 0; }

    .asset-name {
      flex: 1;
      font-size: 11px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .asset-size {
      font-size: 9px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
    }

    /* source code fallback */
    .source-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: 10px;
      color: var(--blue);
      font-family: 'IBM Plex Mono', monospace;
      text-decoration: none;
    }
    .source-link:hover { text-decoration: underline; }

    /* ── FOOTER ── */
    footer {
      padding: 20px 20px 40px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .footer-text {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      line-height: 1.9;
    }

    .footer-text a {
      color: var(--green);
      text-decoration: none;
    }

    .cursor-end {
      display: inline-block;
      width: 7px; height: 12px;
      background: var(--green);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }

    /* empty state */
    .empty-state {
      padding: 50px 0;
      text-align: center;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <span class="prompt-symbol">▋</span>
      <span class="site-title">de4ualt-dev<span>/releases</span></span>
    </div>
    <div class="header-sub">// public release feed</div>
    <div class="status-bar">
      <span class="status-dot"></span>
      <span id="repo-label">loading...</span>
      <span class="sep">|</span>
      <span id="release-count">— releases</span>
      <span class="sep">|</span>
      <span id="last-updated">—</span>
    </div>
  </header>

  <main>
    <div id="loading">
      <div class="loader-text">$ fetching releases...</div>
      <div class="loader-bar"></div>
    </div>

    <div id="error-msg"></div>
    <div id="releases-container"></div>
  </main>

  <footer>
    <div class="footer-text">
      powered by github releases api<br>
      <a href="https://github.com/de4ualt-dev" target="_blank">github.com/de4ualt-dev</a>
      <span class="cursor-end"></span>
    </div>
  </footer>

  <script>
    // ─────────────────────────────────────────────
    //  CONFIG — change OWNER and REPO as needed
    // ─────────────────────────────────────────────
    const OWNER = 'de4ualt-dev';
    const REPO  = 'https://github.com/de4ualt-dev/de4ualt-dev.github.io'; // ← swap this

    // ─────────────────────────────────────────────

    function formatBytes(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1)   return 'just now';
      if (m < 60)  return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24)  return h + 'h ago';
      const d = Math.floor(h / 24);
      if (d < 30)  return d + 'd ago';
      const mo = Math.floor(d / 30);
      if (mo < 12) return mo + 'mo ago';
      return Math.floor(mo / 12) + 'y ago';
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    function buildCard(release, isFirst) {
      const card = document.createElement('div');
      card.className = 'release-card';
      card.style.animationDelay = (isFirst ? 0 : Math.random() * 0.2) + 's';

      // tags
      const tags = [];
      if (isFirst && !release.prerelease) tags.push('<span class="badge badge-latest">latest</span>');
      if (release.prerelease) tags.push('<span class="badge badge-prerelease">pre-release</span>');
      tags.push(`<span class="badge badge-tag">${escHtml(release.tag_name)}</span>`);

      // notes — trim long ones
      const rawNotes = (release.body || '').trim();
      const MAX = 300;
      const truncated = rawNotes.length > MAX;
      const shortNotes = truncated ? rawNotes.slice(0, MAX) + '…' : rawNotes;

      // assets
      const assets = release.assets || [];
      const assetsHtml = assets.length > 0
        ? `<div class="card-assets">
            <div class="assets-label">// assets (${assets.length})</div>
            <div class="asset-list">
              ${assets.map(a => `
                <a class="asset-link" href="${escHtml(a.browser_download_url)}" target="_blank" download>
                  <span class="asset-icon">↓</span>
                  <span class="asset-name">${escHtml(a.name)}</span>
                  <span class="asset-size">${formatBytes(a.size)}</span>
                </a>
              `).join('')}
            </div>
          </div>`
        : `<div class="card-assets">
            <a class="source-link" href="${escHtml(release.zipball_url)}" target="_blank">
              ↓ source.zip
            </a>
            &nbsp;
            <a class="source-link" href="${escHtml(release.tarball_url)}" target="_blank">
              ↓ source.tar.gz
            </a>
          </div>`;

      card.innerHTML = `
        <div class="card-header">
          <div class="card-left">
            <div class="tag-row">${tags.join('')}</div>
            <div class="release-name">${escHtml(release.name || release.tag_name)}</div>
            <div class="release-date">${formatDate(release.published_at)} &nbsp;·&nbsp; ${timeAgo(release.published_at)}</div>
          </div>
        </div>
        ${rawNotes ? `
        <div class="card-body">
          <div class="release-notes" id="notes-${release.id}">${escHtml(shortNotes)}</div>
          ${truncated ? `<button class="notes-toggle" onclick="toggleNotes(this, '${release.id}', ${JSON.stringify(rawNotes)})">[ show more ]</button>` : ''}
        </div>` : ''}
        ${assetsHtml}
      `;

      return card;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function toggleNotes(btn, id, full) {
      const el = document.getElementById('notes-' + id);
      if (btn.dataset.open === '1') {
        el.textContent = full.slice(0, 300) + '…';
        btn.textContent = '[ show more ]';
        btn.dataset.open = '0';
      } else {
        el.textContent = full;
        btn.textContent = '[ show less ]';
        btn.dataset.open = '1';
      }
    }
    window.toggleNotes = toggleNotes;

    async function loadReleases() {
      const container = document.getElementById('releases-container');
      const loading   = document.getElementById('loading');
      const errorDiv  = document.getElementById('error-msg');

      try {
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/releases?per_page=30`,
          { headers: { 'Accept': 'application/vnd.github+json' } }
        );

        loading.style.display = 'none';

        if (!res.ok) {
          const j = await res.json().catch(() => ({}));
          throw new Error(j.message || `HTTP ${res.status}`);
        }

        const releases = await res.json();

        // update status bar
        document.getElementById('repo-label').textContent = `${OWNER}/${REPO}`;
        document.getElementById('release-count').textContent = `${releases.length} release${releases.length !== 1 ? 's' : ''}`;
        if (releases.length > 0) {
          document.getElementById('last-updated').textContent = 'updated ' + timeAgo(releases[0].published_at);
        }

        if (releases.length === 0) {
          container.innerHTML = '<div class="empty-state">// no releases found</div>';
          return;
        }

        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = '// release history';
        container.appendChild(label);

        releases.forEach((r, i) => {
          container.appendChild(buildCard(r, i === 0));
        });

      } catch (err) {
        loading.style.display = 'none';
        errorDiv.style.display = 'block';
        errorDiv.textContent = `// error: ${err.message}\n// check that OWNER and REPO are correct in the config.`;
      }
    }

    loadReleases();
  </script>
</body>
</html>
