<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>de4ualt-dev / releases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0a;
      --bg2:       #111111;
      --bg3:       #181818;
      --border:    #222222;
      --border2:   #2e2e2e;
      --green:     #39ff6a;
      --green-dim: #1a4a2e;
      --text:      #d4d4d4;
      --text-dim:  #555555;
      --text-muted:#888888;
      --red:       #ff4444;
      --yellow:    #f0c040;
      --blue:      #4da6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .prompt-symbol {
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .site-title { font-size: 16px; font-weight: 600; color: #fff; }
    .site-title span { color: var(--green); }
    .header-sub {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      padding-left: 22px;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      flex-wrap: wrap;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }
    .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .sep { color: var(--border2); }

    /* ── REPO SELECTOR ── */
    .repo-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 4px;
    }
    .repo-bar label {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
    }
    .repo-bar select {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 3px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    .repo-bar select:focus { border-color: var(--green); }
    .repo-bar select option { background: var(--bg2); }

    /* ── MAIN ── */
    main { padding: 0 16px 60px; max-width: 540px; margin: 0 auto; }

    #loading { padding: 60px 0; text-align: center; }
    .loader-text { font-size: 12px; color: var(--green); font-family: 'IBM Plex Mono', monospace; }
    .loader-bar { margin: 12px auto 0; width: 160px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .loader-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: var(--green);
      animation: slide 1s ease-in-out infinite alternate;
    }
    @keyframes slide { from{transform:translateX(-100%)} to{transform:translateX(350%)} }

    #error-msg {
      display: none;
      margin: 30px 0;
      padding: 14px;
      border: 1px solid var(--red);
      border-radius: 4px;
      background: rgba(255,68,68,0.05);
      font-size: 11px;
      color: var(--red);
      font-family: 'IBM Plex Mono', monospace;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 20px 0 12px;
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── CARDS ── */
    .release-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.35s ease both;
    }
    .release-card:hover { border-color: var(--border2); transform: translateY(-1px); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .card-header { display:flex; align-items:flex-start; padding:14px 14px 10px; gap:10px; }
    .card-left { flex:1; min-width:0; }

    .tag-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
    .badge {
      font-size: 9px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-latest { background:var(--green-dim); color:var(--green); border:1px solid rgba(57,255,106,0.25); }
    .badge-pre    { background:rgba(240,192,64,0.1); color:var(--yellow); border:1px solid rgba(240,192,64,0.25); }
    .badge-tag    { background:var(--bg3); color:var(--text-muted); border:1px solid var(--border); }

    .release-name { font-size:14px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .release-date { font-size:10px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; margin-top:3px; }

    .card-body { padding:0 14px 12px; }
    .release-notes {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      line-height: 1.7;
      border-left: 2px solid var(--border2);
      padding-left: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .notes-toggle {
      background:none; border:none; color:var(--green);
      font-family:'JetBrains Mono',monospace; font-size:10px;
      cursor:pointer; padding:4px 0 8px; display:block;
    }
    .notes-toggle:hover { text-decoration:underline; }

    .card-assets { border-top:1px solid var(--border); padding:10px 14px 12px; }
    .assets-label { font-size:9px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:7px; }
    .asset-list { display:flex; flex-direction:column; gap:5px; }
    .asset-link {
      display:flex; align-items:center; gap:8px;
      padding:7px 10px;
      background:var(--bg3); border:1px solid var(--border); border-radius:4px;
      text-decoration:none;
      transition:border-color 0.15s, background 0.15s;
    }
    .asset-link:hover { border-color:var(--green); background:rgba(57,255,106,0.04); }
    .asset-icon { color:var(--green); font-size:11px; flex-shrink:0; }
    .asset-name { flex:1; font-size:11px; color:var(--text); font-family:'IBM Plex Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .asset-size { font-size:9px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; flex-shrink:0; }
    .source-links { display:flex; gap:12px; flex-wrap:wrap; }
    .source-link { display:inline-flex; align-items:center; gap:6px; margin-top:4px; font-size:10px; color:var(--blue); font-family:'IBM Plex Mono',monospace; text-decoration:none; }
    .source-link:hover { text-decoration:underline; }

    .empty-state { padding:50px 0; text-align:center; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; font-size:12px; line-height:2; }

    /* ── FOOTER ── */
    footer { padding:20px 20px 40px; border-top:1px solid var(--border); text-align:center; }
    .footer-text { font-size:10px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; line-height:1.9; }
    .footer-text a { color:var(--green); text-decoration:none; }
    .cursor-end { display:inline-block; width:7px; height:12px; background:var(--green); margin-left:2px; vertical-align:middle; animation:blink 1.1s step-end infinite; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="prompt-symbol">▋</span>
    <span class="site-title">de4ualt-dev<span>/releases</span></span>
  </div>
  <div class="header-sub">// public release feed</div>
  <div class="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="repo-label">connecting...</span>
    <span class="sep">|</span>
    <span id="release-count">—</span>
    <span class="sep">|</span>
    <span id="last-updated">—</span>
  </div>
  <div class="repo-bar">
    <label>$ repo:</label>
    <select id="repo-select" onchange="switchRepo(this.value)">
      <option value="">— loading —</option>
    </select>
  </div>
</header>

<main>
  <div id="loading">
    <div class="loader-text" id="loader-text">$ fetching repos...</div>
    <div class="loader-bar"></div>
  </div>
  <div id="error-msg"></div>
  <div id="releases-container"></div>
</main>

<footer>
  <div class="footer-text">
    powered by github releases api<br>
    <a href="https://github.com/de4ualt-dev" target="_blank">github.com/de4ualt-dev</a>
    <span class="cursor-end"></span>
  </div>
</footer>

<script>
  const OWNER = 'de4ualt-dev';

  /* ── helpers ── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatBytes(b) {
    if (!b) return '';
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }
  function timeAgo(d) {
    const diff = Date.now() - new Date(d).getTime();
    const m = Math.floor(diff/60000);
    if (m < 1)   return 'just now';
    if (m < 60)  return m + 'm ago';
    const h = Math.floor(m/60);
    if (h < 24)  return h + 'h ago';
    const dy = Math.floor(h/24);
    if (dy < 30) return dy + 'd ago';
    const mo = Math.floor(dy/30);
    if (mo < 12) return mo + 'mo ago';
    return Math.floor(mo/12) + 'y ago';
  }
  function formatDate(d) {
    return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  }
  async function ghFetch(url) {
    const res = await fetch(url, {headers:{'Accept':'application/vnd.github+json'}});
    if (!res.ok) {
      const j = await res.json().catch(()=>({}));
      throw new Error(j.message || `HTTP ${res.status}`);
    }
    return res.json();
  }
  function setStatus(online) {
    document.getElementById('status-dot').className = 'status-dot' + (online ? '' : ' offline');
  }
  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error-msg');
    el.style.display = 'block';
    el.textContent = msg;
    setStatus(false);
  }
  function clearError() {
    const el = document.getElementById('error-msg');
    el.style.display = 'none';
    el.textContent = '';
  }

  /* ── boot: load all repos, find first with releases ── */
  async function boot() {
    try {
      const repos = await ghFetch(`https://api.github.com/users/${OWNER}/repos?per_page=100&sort=updated`);

      const sel = document.getElementById('repo-select');
      sel.innerHTML = '';

      if (!repos.length) {
        sel.innerHTML = '<option value="">no public repos</option>';
        showError('// no public repos found for ' + OWNER);
        return;
      }

      // populate dropdown with all repos
      repos.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.name;
        opt.textContent = r.name + (r.fork ? ' (fork)' : '');
        sel.appendChild(opt);
      });

      // find first repo that actually has releases
      document.getElementById('loader-text').textContent = '$ scanning for releases...';
      let picked = null;
      for (const r of repos) {
        try {
          const rel = await ghFetch(`https://api.github.com/repos/${OWNER}/${r.name}/releases?per_page=1`);
          if (rel.length > 0) { picked = r.name; break; }
        } catch(e) { /* skip */ }
      }

      if (picked) {
        sel.value = picked;
        await loadReleases(picked);
      } else {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('repo-label').textContent = OWNER;
        document.getElementById('release-count').textContent = 'no releases yet';
        document.getElementById('releases-container').innerHTML =
          `<div class="empty-state">// no releases found across your repos<br>create a release on github and it will appear here automatically</div>`;
        setStatus(true);
      }
    } catch(err) {
      showError(`// could not reach github api\n// ${err.message}\n\n// check your internet connection or try again later.`);
    }
  }

  /* ── switch repo from dropdown ── */
  async function switchRepo(name) {
    if (!name) return;
    clearError();
    document.getElementById('releases-container').innerHTML = '';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loader-text').textContent = `$ fetching ${name}...`;
    await loadReleases(name);
  }
  window.switchRepo = switchRepo;

  /* ── load releases for a repo ── */
  async function loadReleases(repoName) {
    const container = document.getElementById('releases-container');
    const loading   = document.getElementById('loading');
    try {
      const releases = await ghFetch(`https://api.github.com/repos/${OWNER}/${repoName}/releases?per_page=30`);
      loading.style.display = 'none';
      container.innerHTML = '';

      document.getElementById('repo-label').textContent = `${OWNER}/${repoName}`;
      document.getElementById('release-count').textContent = `${releases.length} release${releases.length !== 1 ? 's' : ''}`;
      document.getElementById('last-updated').textContent = releases.length
        ? 'updated ' + timeAgo(releases[0].published_at)
        : 'no releases';
      setStatus(true);

      if (!releases.length) {
        container.innerHTML = '<div class="empty-state">// no releases in this repo yet</div>';
        return;
      }

      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = '// release history';
      container.appendChild(label);

      releases.forEach((r, i) => container.appendChild(buildCard(r, i === 0)));
    } catch(err) {
      loading.style.display = 'none';
      showError(`// error loading "${repoName}"\n// ${err.message}`);
    }
  }

  /* ── build a release card ── */
  function buildCard(release, isFirst) {
    const card = document.createElement('div');
    card.className = 'release-card';
    card.style.animationDelay = (isFirst ? 0 : Math.random() * 0.25) + 's';

    const tags = [];
    if (isFirst && !release.prerelease) tags.push('<span class="badge badge-latest">latest</span>');
    if (release.prerelease) tags.push('<span class="badge badge-pre">pre-release</span>');
    tags.push(`<span class="badge badge-tag">${esc(release.tag_name)}</span>`);

    const rawNotes = (release.body || '').trim();
    const MAX = 300;
    const truncated = rawNotes.length > MAX;
    const shortNotes = truncated ? rawNotes.slice(0, MAX) + '…' : rawNotes;

    const assets = release.assets || [];
    const assetsHtml = assets.length
      ? `<div class="card-assets">
           <div class="assets-label">// assets (${assets.length})</div>
           <div class="asset-list">
             ${assets.map(a => `
               <a class="asset-link" href="${esc(a.browser_download_url)}" target="_blank">
                 <span class="asset-icon">↓</span>
                 <span class="asset-name">${esc(a.name)}</span>
                 <span class="asset-size">${formatBytes(a.size)}</span>
               </a>`).join('')}
           </div>
         </div>`
      : `<div class="card-assets">
           <div class="assets-label">// source code</div>
           <div class="source-links">
             <a class="source-link" href="${esc(release.zipball_url)}" target="_blank">↓ .zip</a>
             <a class="source-link" href="${esc(release.tarball_url)}" target="_blank">↓ .tar.gz</a>
           </div>
         </div>`;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-left">
          <div class="tag-row">${tags.join('')}</div>
          <div class="release-name">${esc(release.name || release.tag_name)}</div>
          <div class="release-date">${formatDate(release.published_at)} &nbsp;·&nbsp; ${timeAgo(release.published_at)}</div>
        </div>
      </div>
      ${rawNotes ? `
      <div class="card-body">
        <div class="release-notes" id="notes-${release.id}">${esc(shortNotes)}</div>
        ${truncated ? `<button class="notes-toggle" onclick="toggleNotes(this,'${release.id}',${JSON.stringify(rawNotes)})">[ show more ]</button>` : ''}
      </div>` : ''}
      ${assetsHtml}
    `;
    return card;
  }

  function toggleNotes(btn, id, full) {
    const el = document.getElementById('notes-' + id);
    if (btn.dataset.open === '1') {
      el.textContent = full.slice(0,300) + '…';
      btn.textContent = '[ show more ]';
      btn.dataset.open = '0';
    } else {
      el.textContent = full;
      btn.textContent = '[ show less ]';
      btn.dataset.open = '1';
    }
  }
  window.toggleNotes = toggleNotes;

  boot();
</script>
</body>
</html>
